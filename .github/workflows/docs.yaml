name: Docs

# Builds the documentation site (Material for MkDocs guides + Dokka API reference)
# and deploys it to GitHub Pages.
#
# One-time setup: in the repository's Settings → Pages, set "Source" to
# "GitHub Actions".

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'kexcel/**'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/docs.yaml'
  workflow_dispatch:

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

env:
  JAVA_VERSION: 17

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate API reference (Dokka)
        run: ./gradlew :kexcel:dokkaGenerate

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Copy Dokka output into the site (docs/api)
        run: |
          mkdir -p docs/api
          cp -r kexcel/build/dokka/html/. docs/api/

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only deploy from the canonical repository, never from forks.
    if: github.repository == 'ShreyashKore/kexcel'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
