POM_DESCRIPTION=Kexcel is a pure Kotlin Multiplatform library for reading and writing Excel (.xlsx) spreadsheets on JVM, Android and iOS. No Apache POI and no JVM-only dependencies, so the same code runs in commonMain — supports cell styling, number formats, formulas, merged cells and find-and-replace.