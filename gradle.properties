POM_LICENSE_URL=https://opensource.org/licenses/MIT
POM_SCM_URL=https://github.com/ShreyashKore/kexcel
POM_SCM_CONNECTION=scm:git:git://github.com/ShreyashKore/kexcel.git
POM_SCM_DEV_CONNECTION=scm:git:ssh://git@github.com/ShreyashKore/kexcel.git
