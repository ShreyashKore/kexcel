site_name: Kexcel
site_description: A pure Kotlin Multiplatform library for reading and writing Excel (.xlsx) files.
site_author: Shreyash Kore
site_url: https://shreyashkore.github.io/kexcel/

repo_name: ShreyashKore/kexcel
repo_url: https://github.com/ShreyashKore/kexcel
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Shreyash Kore

theme:
  name: material
  language: en
  icon:
    logo: material/file-table
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# `api/` is the Dokka HTML reference. It is generated by
# `./gradlew :kexcel:dokkaGenerate` and copied into `docs/api/` by the docs
# workflow before `mkdocs build` runs, so the link below resolves in CI. When
# serving locally without generating it first, MkDocs logs a harmless warning.
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ShreyashKore/kexcel
    - icon: fontawesome/brands/android
      link: https://central.sonatype.com/artifact/com.gyanoba.kexcel/kexcel

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  nav:
    not_found: info
  links:
    not_found: ignore

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Guides:
      - Workbooks & Sheets: guides/workbooks-and-sheets.md
      - Reading & Writing Cells: guides/reading-and-writing.md
      - Cell Styling: guides/styling.md
      - Number Formats: guides/number-formats.md
      - Formulas: guides/formulas.md
      - Rows & Columns: guides/rows-and-columns.md
      - Merging Cells: guides/merging.md
      - Column Widths & Row Heights: guides/sizing.md
      - Find & Replace: guides/find-and-replace.md
      - Saving & Loading: guides/saving.md
  - Concepts:
      - How Kexcel Works: concepts/architecture.md
  - Contributing: contributing.md
  - API Reference: api/index.html
